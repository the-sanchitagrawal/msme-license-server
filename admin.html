<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSME Tool — Admin Dashboard</title>
<style>
:root {
  --bg:#f0f4f8; --surface:#fff; --border:#e2e8f0;
  --accent:#1e40af; --green:#059669; --red:#dc2626; --amber:#d97706;
  --text:#1e293b; --text2:#64748b; --sans:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;}
.topbar{background:var(--accent);color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.topbar h1{font-size:17px;font-weight:700;}
.topbar .sub{opacity:.7;font-size:11px;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 52px);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.login-box h2{font-size:16px;margin-bottom:20px;color:var(--accent);}
.main-wrap{padding:20px 24px;display:none;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.kpi .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:6px;}
.kpi .value{font-size:26px;font-weight:800;color:var(--accent);}
.kpi .sub{font-size:10px;color:var(--text2);margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:18px;}
.card h2{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--accent);display:flex;align-items:center;gap:8px;}
label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:3px;}
input,select,textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:10px;font-family:var(--sans);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{background:#1d4ed8;}
.btn-success{background:var(--green);color:#fff;} .btn-success:hover{background:#047857;}
.btn-danger{background:var(--red);color:#fff;} .btn-danger:hover{background:#b91c1c;}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:4px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#f1f5f9;font-weight:700;font-size:11px;text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:#f8fafc;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.badge-green{background:#d1fae5;color:#065f46;}
.badge-red{background:#fee2e2;color:#7f1d1d;}
.badge-amber{background:#fef3c7;color:#78350f;}
.badge-blue{background:#dbeafe;color:#1e40af;}
.progress{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:3px;}
.progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:.3s;}
.progress-bar.warn{background:var(--amber);}
.progress-bar.danger{background:var(--red);}
.key-code{font-family:'Courier New',monospace;background:#f1f5f9;padding:3px 7px;border-radius:4px;font-size:11px;letter-spacing:.5px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:12px;padding:24px;width:680px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent);}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin:14px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.alert{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:12px;}
.alert-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0;}
.alert-error{background:#fee2e2;color:#7f1d1d;border:1px solid #fecaca;}
#newKeyDisplay{font-family:'Courier New',monospace;font-size:18px;font-weight:700;color:var(--accent);background:#eff6ff;border:2px dashed var(--accent);border-radius:8px;padding:14px;text-align:center;margin:14px 0;letter-spacing:2px;display:none;}
</style>
</head>
<body>

<div class="topbar">
  <h1>🔑 MSME Tool — Admin Dashboard</h1>
  <span class="sub" id="adminInfo"></span>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-primary btn-sm" onclick="loadDash()" style="display:none;" id="refreshBtn">↻ Refresh</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;" onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <label>Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://your-server.railway.app" value="">
    <label>Admin Password</label>
    <input type="password" id="adminPw" placeholder="Enter admin password">
    <div id="loginErr" class="alert alert-error" style="display:none;"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="doLogin()">Login →</button>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap" id="mainWrap">

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Create License -->
  <div class="card">
    <h2>➕ Create New License Key</h2>
    <div class="grid3">
      <div>
        <label>Client Name *</label>
        <input type="text" id="f_name" placeholder="e.g. Deloitte India">
      </div>
      <div>
        <label>Client Email</label>
        <input type="email" id="f_email" placeholder="contact@client.com">
      </div>
      <div>
        <label>Plan</label>
        <select id="f_plan" onchange="planDefaults()">
          <option value="starter">Starter — 5 entities, 50 reports/mo</option>
          <option value="professional">Professional — 25 entities, 300 reports/mo</option>
          <option value="enterprise">Enterprise — 100 entities, unlimited reports</option>
          <option value="custom">Custom</option>
        </select>
      </div>
    </div>
    <div class="grid3">
      <div>
        <label>Entity Limit (per month)</label>
        <input type="number" id="f_elimit" value="5" min="1">
      </div>
      <div>
        <label>Report Run Limit (per month)</label>
        <input type="number" id="f_rlimit" value="50" min="1">
      </div>
      <div>
        <label>Expires On (blank = never)</label>
        <input type="date" id="f_expiry">
      </div>
    </div>
    <div class="grid2">
      <div>
        <label>Domain Lock (optional, e.g. big4.com)</label>
        <input type="text" id="f_domain" placeholder="Leave blank for no restriction">
      </div>
      <div>
        <label>Notes (internal)</label>
        <input type="text" id="f_notes" placeholder="e.g. Big 4 client, FY26 contract">
      </div>
    </div>
    <div id="createMsg"></div>
    <div id="newKeyDisplay"></div>
    <button class="btn btn-success" onclick="createLicense()">🔑 Generate License Key</button>
  </div>

  <!-- License Table -->
  <div class="card">
    <h2>📋 All Licenses <span style="font-size:11px;font-weight:400;color:var(--text2);">— click a row to see full usage detail</span></h2>
    <div style="overflow-x:auto;">
      <table id="licTable">
        <thead>
          <tr>
            <th>Client</th><th>License Key</th><th>Plan</th>
            <th>Entities Used</th><th>Reports Used</th>
            <th>Expires</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="licBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Usage Detail Modal -->
<div class="modal-bg" id="usageModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 id="modalTitle">Usage Detail</h2>
      <button class="btn btn-sm btn-danger" onclick="closeModal()">✕ Close</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
let SERVER = '', PW = '';

function planDefaults() {
  const p = document.getElementById('f_plan').value;
  const limits = { starter:[5,50], professional:[25,300], enterprise:[100,9999], custom:[10,100] };
  const [e,r] = limits[p] || [5,50];
  document.getElementById('f_elimit').value = e;
  document.getElementById('f_rlimit').value = r;
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type':'application/json', 'x-admin-password': PW } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SERVER + path, opts);
  return r.json();
}

async function doLogin() {
  SERVER = document.getElementById('serverUrl').value.trim().replace(/\/$/,'');
  PW     = document.getElementById('adminPw').value.trim();
  try {
    const d = await api('GET', '/admin/dashboard');
    if (d.error) { showLoginErr('Wrong password or server URL'); return; }
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('mainWrap').style.display  = 'block';
    document.getElementById('refreshBtn').style.display = '';
    document.getElementById('logoutBtn').style.display  = '';
    document.getElementById('adminInfo').textContent = 'Connected: ' + SERVER;
    renderDash(d);
    loadLicenses();
  } catch(e) { showLoginErr('Cannot reach server: ' + e.message); }
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.style.display = 'block'; el.textContent = msg;
}

function logout() {
  SERVER=''; PW='';
  document.getElementById('loginWrap').style.display = '';
  document.getElementById('mainWrap').style.display  = 'none';
}

async function loadDash() {
  const d = await api('GET', '/admin/dashboard');
  renderDash(d);
  loadLicenses();
}

function renderDash(d) {
  document.getElementById('kpiGrid').innerHTML = [
    ['Total Licenses',     d.totalLicenses,       'All time'],
    ['Active Licenses',    d.activeLicenses,       'Currently enabled'],
    ['Reports This Month', d.reportsThisCycle,     'Current billing cycle'],
    ['Entities This Month',d.entitiesThisCycle,    'Unique client entities run'],
  ].map(([label,value,sub]) => `
    <div class="kpi">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
      <div class="sub">${sub}</div>
    </div>`).join('');
}

async function loadLicenses() {
  const data = await api('GET', '/admin/licenses');
  const tbody = document.getElementById('licBody');
  tbody.innerHTML = data.map(l => {
    const ePct = Math.min(100, Math.round(l.entitiesUsedThisCycle/l.entity_limit*100));
    const rPct = Math.min(100, Math.round(l.reportsUsedThisCycle/l.report_limit*100));
    const eBarCls = ePct>85?'danger':ePct>60?'warn':'';
    const rBarCls = rPct>85?'danger':rPct>60?'warn':'';
    const planBadge = {starter:'badge-blue',professional:'badge-amber',enterprise:'badge-green',custom:'badge-blue'}[l.plan]||'badge-blue';
    return `<tr style="cursor:pointer;" onclick="showUsage('${l.key}','${l.client_name}')">
      <td><strong>${l.client_name}</strong><br><span style="font-size:10px;color:var(--text2);">${l.client_email||''}</span></td>
      <td><span class="key-code">${l.key}</span></td>
      <td><span class="badge ${planBadge}">${l.plan}</span></td>
      <td>
        <div>${l.entitiesUsedThisCycle} / ${l.entity_limit}</div>
        <div class="progress"><div class="progress-bar ${eBarCls}" style="width:${ePct}%"></div></div>
      </td>
      <td>
        <div>${l.reportsUsedThisCycle} / ${l.report_limit}</div>
        <div class="progress"><div class="progress-bar ${rBarCls}" style="width:${rPct}%"></div></div>
      </td>
      <td>${l.expires_on||'<span style="color:var(--green)">Never</span>'}</td>
      <td><span class="badge ${l.active?'badge-green':'badge-red'}">${l.active?'Active':'Suspended'}</span></td>
      <td onclick="event.stopPropagation()">
        ${l.active
          ? `<button class="btn btn-danger btn-sm" onclick="suspend('${l.key}')">Suspend</button>`
          : `<button class="btn btn-success btn-sm" onclick="activate('${l.key}')">Activate</button>`}
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:20px;">No licenses yet. Create one above.</td></tr>';
}

async function createLicense() {
  const clientName = document.getElementById('f_name').value.trim();
  if (!clientName) { alert('Client name is required'); return; }
  const body = {
    clientName, clientEmail: document.getElementById('f_email').value,
    plan: document.getElementById('f_plan').value,
    entityLimit: +document.getElementById('f_elimit').value,
    reportLimit: +document.getElementById('f_rlimit').value,
    expiresOn: document.getElementById('f_expiry').value || null,
    lockedDomain: document.getElementById('f_domain').value || null,
    notes: document.getElementById('f_notes').value,
  };
  const d = await api('POST', '/admin/license/create', body);
  if (d.success) {
    const kd = document.getElementById('newKeyDisplay');
    kd.style.display = 'block'; kd.textContent = d.key;
    document.getElementById('createMsg').innerHTML = `<div class="alert alert-success">✅ License created for <strong>${d.clientName}</strong> — copy the key above and send to client.</div>`;
    loadLicenses();
  } else {
    document.getElementById('createMsg').innerHTML = `<div class="alert alert-error">❌ ${d.error}</div>`;
  }
}

async function suspend(key) {
  if (!confirm('Suspend this license? The tool will stop working for this client immediately.')) return;
  await api('POST', `/admin/license/${key}/suspend`);
  loadLicenses(); loadDash();
}

async function activate(key) {
  await api('POST', `/admin/license/${key}/activate`);
  loadLicenses(); loadDash();
}

async function showUsage(key, name) {
  document.getElementById('modalTitle').textContent = `Usage Detail — ${name}`;
  document.getElementById('modalContent').innerHTML = '<p style="color:var(--text2)">Loading…</p>';
  document.getElementById('usageModal').classList.add('open');

  const d = await api('GET', `/admin/license/${key}/usage`);
  const l = d.license;

  document.getElementById('modalContent').innerHTML = `
    <div class="grid2" style="margin-bottom:14px;">
      <div><strong>Key:</strong> <span class="key-code">${l.key}</span></div>
      <div><strong>Plan:</strong> ${l.plan} | <strong>Expires:</strong> ${l.expires_on||'Never'}</div>
      <div><strong>Entity Limit:</strong> ${l.entity_limit}/month</div>
      <div><strong>Report Limit:</strong> ${l.report_limit}/month</div>
    </div>

    <div class="section-label">Monthly Usage History</div>
    <table style="margin-bottom:16px;">
      <thead><tr><th>Month</th><th>Entities</th><th>Reports Run</th></tr></thead>
      <tbody>${d.monthly.map(m=>`<tr><td>${m.month}</td><td>${m.entities}</td><td>${m.reports}</td></tr>`).join('')||'<tr><td colspan="3" style="color:var(--text2)">No usage yet</td></tr>'}</tbody>
    </table>

    <div class="section-label">All Entities Ever Run (${d.entities.length})</div>
    <table style="margin-bottom:16px;">
      <thead><tr><th>Entity / Company Name</th><th>First Run</th><th>Last Run</th><th>Total Runs</th></tr></thead>
      <tbody>${d.entities.map(e=>`<tr><td><strong>${e.entity_name}</strong></td><td>${e.first_seen.slice(0,10)}</td><td>${e.last_seen.slice(0,10)}</td><td>${e.run_count}</td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--text2)">No entities yet</td></tr>'}</tbody>
    </table>

    <div class="section-label">Recent 100 Report Runs</div>
    <table>
      <thead><tr><th>Date/Time</th><th>Entity</th><th>Vendors</th><th>Rows</th><th>Origin</th></tr></thead>
      <tbody>${d.recent.map(r=>`<tr><td>${r.logged_at.slice(0,16)}</td><td>${r.entity_name}</td><td>${r.vendor_count}</td><td>${r.row_count}</td><td style="font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;">${r.origin||'-'}</td></tr>`).join('')||'<tr><td colspan="5" style="color:var(--text2)">No runs yet</td></tr>'}</tbody>
    </table>
  `;
}

function closeModal() {
  document.getElementById('usageModal').classList.remove('open');
}
</script>
</body>
</html>
